config system interface
    edit "wan1"
        set ip 203.0.113.1 255.255.255.248
    next
    edit "port2"
        set ip 10.10.10.1 255.255.255.0
    next
    edit "vlan20"
        set interface "port2"
        set vlanid 20
        set ip 10.20.20.1 255.255.255.0
    next
    edit "dmz"
        set ip 172.16.50.1 255.255.255.0
    next
end

config firewall address
    edit "LAN_NET"
        set subnet 10.10.10.0 255.255.255.0
    next
    edit "VLAN20_NET"
        set subnet 10.20.20.0 255.255.255.0
    next
    edit "DMZ_WEB"
        set subnet 172.16.50.10 255.255.255.255
    next
    edit "HQ_Public"
        set subnet 198.51.100.10 255.255.255.255
    next
    edit "Geo_US"
        set type geography
        set country "US"
    next
    edit "Geo_DE"
        set type geography
        set country "DE"
    next
end

config firewall addrgrp
    edit "Internal_Nets"
        set member "LAN_NET" "VLAN20_NET"
    next
    edit "Allowed_Geo"
        set member "Geo_US" "Geo_DE"
    next
end

config firewall service custom
    edit "HTTPS_ALT"
        set tcp-portrange 8443
    next
    edit "APP_PORTS"
        set tcp-portrange 8080 8443
        set udp-portrange 5000-5005
    next
end

config firewall vip
    edit "VIP_WebPortal"
        set extip 203.0.113.2
        set mappedip "172.16.50.10"
        set extintf "wan1"
        set comment "Published web portal"
    next
end

config firewall policy
    edit 1
        set name "Internet to WebPortal"
        set srcintf "wan1"
        set dstintf "dmz"
        set srcaddr "Geo_US" "Geo_DE"
        set dstaddr "VIP_WebPortal"
        set schedule "always"
        set service "HTTPS" "HTTPS_ALT"
        set action accept
        set nat disable
        set ssl-ssh-profile "deep-inspection"
        set application-list "block-app"
        set av-profile "default"
        set ips-sensor "default"
        set webfilter-profile "monitoring"
        set dnsfilter-profile "dns-strict"
        set logtraffic all
    next
    edit 2
        set name "Internal to Internet"
        set srcintf "port2" "vlan20"
        set dstintf "wan1"
        set srcaddr "Internal_Nets"
        set dstaddr "all"
        set schedule "always"
        set service "HTTP" "HTTPS" "DNS"
        set action accept
        set nat enable
        set ssl-ssh-profile "certificate-inspection"
        set application-list "general-app-control"
        set profile-protocol-options "default"
        set logtraffic all
    next
    edit 3
        set name "Branch to HQ"
        set srcintf "vlan20"
        set dstintf "wan1"
        set srcaddr "VLAN20_NET"
        set dstaddr "HQ_Public"
        set schedule "always"
        set service "APP_PORTS"
        set action accept
        set nat enable
        set ips-sensor "strict-ips"
        set file-filter-profile "block-exe"
        set dlp-sensor "protect-sensitive"
        set logtraffic all
    next
    edit 4
        set name "Deny rest from DMZ"
        set srcintf "dmz"
        set dstintf "wan1"
        set srcaddr "DMZ_WEB"
        set dstaddr "all"
        set schedule "always"
        set service "ALL"
        set action deny
        set nat disable
        set logtraffic all
    next
end
